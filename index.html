<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pushup Pro - Quick Logger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0c">
    <!-- Chart.js for Dashboard -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <!-- View 1: Logger -->
        <div id="loggerView">
            <header>
                <h1>PUSHUP PRO</h1>
                <div class="settings-btn" id="settingsBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </div>
            </header>

            <div class="stats-card">
                <span class="stat-label">DAILY TOTAL</span>
                <div>
                    <span class="stat-value" id="dailyTotal">0</span>
                    <span class="stat-unit">REPS</span>
                </div>
            </div>

            <div class="input-section">
                <div class="count-display" id="currentInput">0</div>
                
                <div class="btn-grid">
                    <button class="btn accent" onclick="adjustCount(5)">+5</button>
                    <button class="btn accent" onclick="adjustCount(10)">+10</button>
                    <button class="btn accent" onclick="adjustCount(20)">+20</button>
                    
                    <button class="btn" onclick="adjustCount(-1)">-1</button>
                    <button class="btn" onclick="resetCount()">C</button>
                    <button class="btn" onclick="adjustCount(1)">+1</button>
                    
                    <button class="btn primary" id="submitBtn">LOG SET</button>
                </div>
            </div>
        </div>

        <!-- View 2: Dashboard -->
        <div id="statsView" style="display: none;">
            <header>
                <h1>PROGRESS</h1>
                <div class="refresh-btn" onclick="fetchData()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                </div>
            </header>

            <div class="dashboard-grid">
                <div class="mini-card">
                    <span class="stat-label">TOTAL REPS</span>
                    <div class="stat-value-sm" id="totalReps">0</div>
                </div>
                <div class="mini-card">
                    <span class="stat-label">MAX SET</span>
                    <div class="stat-value-sm" id="maxSet">0</div>
                </div>
                <div class="mini-card">
                    <span class="stat-label">SESSIONS</span>
                    <div class="stat-value-sm" id="sessionsDone">0</div>
                </div>
                <div class="mini-card">
                    <span class="stat-label">RANK</span>
                    <div class="stat-value-sm" id="currentRank">-</div>
                </div>
            </div>

            <div class="chart-container">
                <h4 style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 8px;">SCORE PROGRESSION</h4>
                <canvas id="scoreChart"></canvas>
            </div>

            <div class="chart-container">
                <h4 style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 8px;">SET DISTRIBUTION</h4>
                <canvas id="distributionChart"></canvas>
            </div>

            <div class="history-list">
                <div class="history-header">
                    <div class="col-date">DATE</div>
                    <div class="col-reps">REPS</div>
                    <div class="col-score">SCORE</div>
                    <div class="col-actions">ACTION</div>
                </div>
                <div id="historyItems">
                    <!-- History items will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchView('logger')" id="nav-logger">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            <span>Log</span>
        </div>
        <div class="nav-item" onclick="switchView('stats')" id="nav-stats">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"></path><path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"></path></svg>
            <span>Stats</span>
        </div>
    </nav>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h2>Settings</h2>
            <div class="input-group">
                <label>Apps Script Web App URL</label>
                <input type="text" id="apiUrl" placeholder="https://script.google.com/macros/s/...">
            </div>
            <button class="btn primary" onclick="saveSettings()">Save & Close</button>
        </div>
    </div>

    <!-- Edit Record Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px; text-align: center;">EDIT RECORD</h3>
            <div id="editDateDisplay" style="text-align: center; color: var(--accent-color); font-weight: bold; margin-bottom: 15px;"></div>
            
            <div style="margin-bottom: 20px;">
                <label style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 8px; display: block;">Enter Sets (comma separated):</label>
                <input type="text" id="editSetsInput" placeholder="e.g. 20, 20, 15" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--glass-border); background: var(--bg-color); color: var(--text-primary); font-family: var(--font-main);">
                <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 5px;">Max 6 sets allowed. e.g. 20, 15, 10</div>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 25px;">
                <button id="deleteRecordBtn" class="btn" style="flex: 1; border-color: #f44336; color: #f44336; padding: 12px; font-size: 1rem; display: flex; justify-content: center; align-items: center; gap: 8px;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                </button>
                <button id="saveEditBtn" class="btn primary" style="flex: 3; margin-top: 0; padding: 12px; font-size: 1rem;">SAVE CHANGES</button>
            </div>
            <button class="btn" onclick="document.getElementById('editModal').style.display='none'" style="width: 100%; margin-top: 10px; padding: 12px; font-size: 1rem;">CANCEL</button>
        </div>
    </div>

    <div class="toast" id="toast">Logged successfully!</div>

    <script src="app.js"></script>
</body>
</html>
